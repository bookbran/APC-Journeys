name: Deploy Inquiry Call Guide to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Inquiry Call Guide/apc-inquiry-call-guide/package-lock.json

      - name: Install and build
        env:
          GITHUB_ACTIONS: true
        working-directory: Inquiry Call Guide/apc-inquiry-call-guide
        run: npm ci && npm run build

      - name: Deploy to gh-pages branch
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Inquiry Call Guide/apc-inquiry-call-guide/dist
